<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">
    <div class="gl-logo">Guild Live</div>
    <nav class="gl-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/watchlist.html">Watchlist</a>
      <a href="/trade.html">Trade</a>
      <a href="/positions.html">Positions</a>
      <a href="/orders.html">Orders</a>
      <a href="/account.html">Account</a>
    </nav>
  </header>

  <main class="gl-main">
    <section class="gl-card gl-card-wide">
      <h1>Support</h1>
      <p class="gl-muted">
        For account or trading issues, contact our support team.
      </p>
      <form class="gl-form">
        <label>
          Subject
          <input type="text" name="subject" required />
        </label>
        <label>
          Message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit" class="gl-btn-primary">Send</button>
      </form>
    </section>
  </main>
</body>
</html>
