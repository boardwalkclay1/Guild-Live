<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Open Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/assets/image/the-guild.png" />
  <link rel="apple-touch-icon" href="/assets/image/the-guild.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">Guild Live – Open Account</header>

  <main class="gl-main">
    <section class="gl-card gl-card-wide">
      <h1>Open Your Brokerage Account</h1>
      <p class="gl-muted">
        This information will be used to create your brokerage account with our clearing partner.
      </p>

      <form class="gl-form" id="kyc-form">
        <h2>Personal</h2>
        <div class="gl-main-grid">
          <label>
            First Name
            <input type="text" name="first_name" required />
          </label>
          <label>
            Last Name
            <input type="text" name="last_name" required />
          </label>
        </div>

        <div class="gl-main-grid">
          <label>
            Date of Birth
            <input type="date" name="dob" required />
          </label>
          <label>
            SSN
            <input type="text" name="ssn" required />
          </label>
        </div>

        <h2>Address</h2>
        <label>
          Street
          <input type="text" name="street" required />
        </label>
        <div class="gl-main-grid">
          <label>
            City
            <input type="text" name="city" required />
          </label>
          <label>
            State
            <input type="text" name="state" required />
          </label>
          <label>
            ZIP
            <input type="text" name="zip" required />
          </label>
        </div>

        <h2>Employment</h2>
        <label>
          Employment Status
          <select name="employment_status" required>
            <option value="">Select</option>
            <option value="employed">Employed</option>
            <option value="self_employed">Self-employed</option>
            <option value="unemployed">Unemployed</option>
            <option value="student">Student</option>
            <option value="retired">Retired</option>
          </select>
        </label>

        <button type="submit" class="gl-btn-primary">Submit Application</button>
        <p class="gl-muted">
          By continuing, you agree to the <a href="/legal.html">terms and disclosures</a>.
        </p>
      </form>
    </section>
  </main>

  <nav class="gl-bottom-nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/watchlist.html">Watchlist</a>
    <a href="/trade.html">Trade</a>
    <a href="/positions.html">Positions</a>
    <a href="/charts.html">Charts</a>
    <a href="/account.html">Account</a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
