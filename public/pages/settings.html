<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/assets/image/the-guild.png" />
  <link rel="apple-touch-icon" href="/assets/image/the-guild.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">Guild Live – Settings</header>

  <main class="gl-main">
    <section class="gl-card gl-card-wide">
      <h1>Settings</h1>

      <form class="gl-form" id="settings-form">
        <h2>Display</h2>
        <label>
          Theme
          <select name="theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>

        <h2>Trading</h2>
        <label>
          Confirm orders before placing
          <input type="checkbox" name="confirm_orders" checked />
        </label>

        <h2>Notifications</h2>
        <label>
          Email trade confirmations
          <input type="checkbox" name="email_confirms" checked />
        </label>

        <button type="submit" class="gl-btn-primary">Save Settings</button>
      </form>
    </section>
  </main>

  <nav class="gl-bottom-nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/watchlist.html">Watchlist</a>
    <a href="/trade.html">Trade</a>
    <a href="/positions.html">Positions</a>
    <a href="/charts.html">Charts</a>
    <a href="/account.html">Account</a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
