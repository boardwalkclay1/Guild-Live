<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/assets/image/the-guild.png" />
  <link rel="apple-touch-icon" href="/assets/image/the-guild.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">Guild Live – Dashboard</header>

  <main class="gl-main gl-main-grid">
    <section class="gl-card">
      <h2>Account Overview</h2>
      <div class="gl-metrics">
        <div>
          <div class="gl-metric-label">Equity</div>
          <div class="gl-metric-value" id="metric-equity">$0.00</div>
        </div>
        <div>
          <div class="gl-metric-label">Buying Power</div>
          <div class="gl-metric-value" id="metric-buying-power">$0.00</div>
        </div>
        <div>
          <div class="gl-metric-label">Cash</div>
          <div class="gl-metric-value" id="metric-cash">$0.00</div>
        </div>
      </div>
    </section>

    <section class="gl-card">
      <h2>Quick Actions</h2>
      <div class="gl-actions-row">
        <a class="gl-btn-secondary" href="/funding.html">Add Funds</a>
        <a class="gl-btn-secondary" href="/trade.html">Place Trade</a>
        <a class="gl-btn-secondary" href="/watchlist.html">Watchlist</a>
      </div>
    </section>

    <section class="gl-card gl-card-wide">
      <h2>Positions Snapshot</h2>
      <table class="gl-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Qty</th>
            <th>Market Value</th>
            <th>P/L Day</th>
          </tr>
        </thead>
        <tbody id="dashboard-positions">
          <tr>
            <td colspan="4" class="gl-muted">No positions yet.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <nav class="gl-bottom-nav">
    <a href="/dashboard.html" class="active">Dashboard</a>
    <a href="/watchlist.html">Watchlist</a>
    <a href="/trade.html">Trade</a>
    <a href="/positions.html">Positions</a>
    <a href="/charts.html">Charts</a>
    <a href="/account.html">Account</a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
