<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Funding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">
    <div class="gl-logo">Guild Live</div>
    <nav class="gl-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/watchlist.html">Watchlist</a>
      <a href="/trade.html">Trade</a>
      <a href="/positions.html">Positions</a>
      <a href="/orders.html">Orders</a>
      <a href="/account.html" class="active">Account</a>
    </nav>
  </header>

  <main class="gl-main gl-main-grid">
    <section class="gl-card">
      <h1>Funding</h1>
      <h2>Link Bank (ACH)</h2>
      <p class="gl-muted">
        Link a bank account to move money between your bank and your brokerage account.
      </p>
      <button class="gl-btn-primary" id="btn-link-bank">Link Bank</button>
    </section>

    <section class="gl-card">
      <h2>Deposit</h2>
      <form class="gl-form" id="deposit-form">
        <label>
          Amount
          <input type="number" name="amount" min="1" step="0.01" required />
        </label>
        <button type="submit" class="gl-btn-primary">Deposit</button>
      </form>
    </section>

    <section class="gl-card">
      <h2>Withdrawal</h2>
      <form class="gl-form" id="withdraw-form">
        <label>
          Amount
          <input type="number" name="amount" min="1" step="0.01" required />
        </label>
        <button type="submit" class="gl-btn-secondary">Withdraw</button>
      </form>
    </section>
  </main>
</body>
</html>
