<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Funding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/assets/image/the-guild.png" />
  <link rel="apple-touch-icon" href="/assets/image/the-guild.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">Guild Live – Funding</header>

  <main class="gl-main gl-main-grid">
    <section class="gl-card">
      <h1>Link Bank</h1>
      <p class="gl-muted">
        Link a bank account to move money between your bank and your brokerage account.
      </p>
      <button class="gl-btn-primary" id="btn-link-bank">Link Bank</button>
    </section>

    <section class="gl-card">
      <h2>Deposit</h2>
      <form class="gl-form" id="deposit-form">
        <label>
          Amount
          <input type="number" name="amount" min="1" step="0.01" required />
        </label>
        <button type="submit" class="gl-btn-primary">Deposit</button>
      </form>
    </section>

    <section class="gl-card">
      <h2>Withdraw</h2>
      <form class="gl-form" id="withdraw-form">
        <label>
          Amount
          <input type="number" name="amount" min="1" step="0.01" required />
        </label>
        <button type="submit" class="gl-btn-secondary">Withdraw</button>
      </form>
    </section>
  </main>

  <nav class="gl-bottom-nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/watchlist.html">Watchlist</a>
    <a href="/trade.html">Trade</a>
    <a href="/positions.html">Positions</a>
    <a href="/charts.html">Charts</a>
    <a href="/account.html" class="active">Account</a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
