<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Watchlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/assets/image/the-guild.png" />
  <link rel="apple-touch-icon" href="/assets/image/the-guild.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">Guild Live – Watchlist</header>

  <main class="gl-main">
    <section class="gl-card gl-card-wide">
      <h1>Watchlist</h1>

      <form class="gl-form gl-inline-form" id="watchlist-add-form">
        <label>
          Symbol
          <input type="text" name="symbol" placeholder="AAPL" required />
        </label>
        <button type="submit" class="gl-btn-primary">Add</button>
      </form>

      <table class="gl-table gl-table-tight">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Last</th>
            <th>Change</th>
            <th>%</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="watchlist-body">
          <tr>
            <td colspan="5" class="gl-muted">No symbols yet.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <nav class="gl-bottom-nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/watchlist.html" class="active">Watchlist</a>
    <a href="/trade.html">Trade</a>
    <a href="/positions.html">Positions</a>
    <a href="/charts.html">Charts</a>
    <a href="/account.html">Account</a>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
