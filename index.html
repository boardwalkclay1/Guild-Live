<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guild Live – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/css/live.css" />
</head>
<body>
  <header class="gl-header">
    <div class="gl-logo">Guild Live</div>
  </header>

  <main class="gl-main gl-auth">
    <section class="gl-card">
      <h1>Sign in to Guild Live</h1>
      <form class="gl-form" action="/dashboard.html" method="get">
        <label>
          Email
          <input type="email" name="email" required />
        </label>
        <label>
          Password
          <input type="password" name="password" required />
        </label>
        <button type="submit" class="gl-btn-primary">Sign In</button>
      </form>
      <p class="gl-muted">
        New here? <a href="/onboarding.html">Create your brokerage account</a>
      </p>
    </section>
  </main>
</body>
</html>
